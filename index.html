<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禾火人 /Aki/</title>
<style>
    :root {
        --color-greece-bg: #EAEFF2;
        --color-greece-white: #FFFFFF;
        --color-greece-blue: #5B7488;
        --color-greece-light-blue: #A3B5C3;
        --color-sumi-text: #2B2B2B; 
        --color-milk-tea: #E1CABB;
        --color-light-brown: #CD853F;
        --nav-height: 80px; /* 回到原本的高度 */
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
        scroll-behavior: smooth;
        scroll-padding-top: calc(var(--nav-height) + 15px); 
    }

    body {
        margin: 0; padding: 0; width: 100%;
        background-color: var(--color-greece-bg);
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        display: flex; flex-direction: column; align-items: center;
        padding-top: 0; padding-bottom: 80px;
    }

    /* 這裡改回橫排的一排按鈕 */
    nav {
        width: 100%; height: var(--nav-height);
        background-color: var(--color-greece-white);
        display: flex; justify-content: center; align-items: center;
        z-index: 10000;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        border-bottom: 2px solid var(--color-greece-light-blue);
        position: relative;
    }

    .nav-links { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); /* 這裡改回橫排 4 個 */
        gap: 12px;
        width: 90%;
        max-width: 500px;
    }

    .nav-item {
        color: white; text-decoration: none; font-weight: bold;
        background-color: var(--color-greece-blue);
        padding: 10px 0; border-radius: 6px;
        text-align: center; display: block; font-size: 0.9em;
        transition: 0.3s ease;
    }
    .nav-item:hover { 
        background-color: var(--color-milk-tea);
        color: var(--color-greece-blue);
        transform: translateY(-2px);
    }

    /* 下方內容維持原樣... (略) */
    #leaf-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }
    .leaf-fall { position: fixed; pointer-events: none; }
    @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 0; } 10% { opacity: 0.8; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    .container { width: 90%; max-width: 800px; position: relative; z-index: 5; }
    h1.site-title { color: var(--color-light-brown); text-align: center; letter-spacing: 5px; margin-top: 40px; font-size: 2.8em; }
    .rickroll-btn { display: block; width: fit-content; margin: 0 auto 50px auto; background-color: var(--color-greece-blue); color: white; text-decoration: none; font-weight: bold; padding: 12px 25px; border-radius: 50px; }
    .section-card { background: var(--color-greece-white); border-radius: 12px; padding: 30px; margin-bottom: 35px; border-left: 8px solid var(--color-greece-light-blue); }
    h3.section-title { color: var(--color-greece-blue); border-bottom: 2px solid var(--color-milk-tea); padding-bottom: 10px; }
    .pit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .pit-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; }
</style>
</head>
<body>
<div id="leaf-container"></div>
<nav>
    <div class="nav-links">
        <a href="#about" class="nav-item">關於我</a>
        <a href="#pit" class="nav-item">坑</a>
        <a href="#other" class="nav-item">其他</a>
        <a href="#contact" class="nav-item">聯絡</a>
    </div>
</nav>
<div class="container">
    <h1 class="site-title">禾火人</h1>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="rickroll-btn">都點進來了不看看我嗎>ouo/</a>
    <div id="about" class="section-card">
        <h3 class="section-title">I. 🍂 個人檔案</h3>
        <p style="color: var(--color-light-brown); font-weight:bold;">CN： 禾火 / 秋 / Aki</p>
        <p>INTP、10/02、天秤座♎</p>
    </div>
    </div>
</body>
</html>
